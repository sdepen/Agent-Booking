<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Agent — Agent Booking</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0a0f;
        color: #e2e0f0;
        font-family: 'DM Mono', monospace;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        background: rgba(10, 10, 15, 0.9);
        backdrop-filter: blur(14px);
      }

      .logo {
        font-family: 'Syne', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.01em;
      }

      .logo span {
        color: #00e5ff;
      }

      header a {
        color: #8683a5;
        text-decoration: none;
        font-size: 13px;
      }

      header a:hover {
        color: #00e5ff;
      }

      .chat {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        padding: 24px 18px;
        gap: 12px;
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
        max-width: 85%;
      }

      .bubble.bot {
        background: #1a1a24;
        border: 1px solid rgba(255, 255, 255, 0.07);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .bubble.user {
        background: #00e5ff;
        color: #020617;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .bubble.meta {
        background: rgba(0, 229, 255, 0.08);
        border: 1px solid rgba(0, 229, 255, 0.22);
        color: #86f1ff;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        align-self: center;
      }

      .bubble.error {
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.28);
        color: #fca5a5;
        align-self: center;
      }

      .typing {
        color: #8683a5;
        font-size: 12px;
        align-self: flex-start;
      }

      .input-row {
        flex-shrink: 0;
        display: flex;
        gap: 12px;
        padding: 18px 24px calc(env(safe-area-inset-bottom, 16px) + 18px);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        background: rgba(10, 10, 15, 0.95);
        backdrop-filter: blur(18px);
      }

      .input-row input {
        flex: 1;
        background: #1a1a24;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        padding: 14px 16px;
        outline: none;
      }

      .input-row input:focus {
        border-color: rgba(0, 229, 255, 0.7);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.16);
      }

      .input-row button {
        background: #00e5ff;
        border: none;
        border-radius: 12px;
        color: #020617;
        font-weight: 700;
        font-family: 'Syne', sans-serif;
        padding: 14px 22px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .input-row button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 20px 50px -26px rgba(0, 229, 255, 0.6);
      }

      .input-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      @media (max-width: 720px) {
        .chat {
          padding: 20px 16px;
        }

        .bubble {
          max-width: 90%;
        }
      }

      /* Popup recontact */
      .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(6px);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .popup-overlay.visible {
        display: flex;
      }

      .popup {
        background: #111118;
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 20px;
        padding: 36px 32px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 40px 100px -40px rgba(0, 229, 255, 0.3);
        animation: popIn 0.2s ease-out;
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.95) translateY(8px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .popup-title {
        font-family: 'Syne', sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
      }

      .popup-sub {
        font-size: 13px;
        color: #9a96b7;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .popup label {
        font-size: 11px;
        letter-spacing: 0.2em;
        color: #6d6a84;
        text-transform: uppercase;
        display: block;
        margin-bottom: 8px;
        margin-top: 16px;
      }

      .popup input {
        width: 100%;
        background: #161621;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        padding: 13px 16px;
        outline: none;
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      .popup input:focus {
        border-color: rgba(0, 229, 255, 0.7);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
      }

      .popup-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .popup-submit {
        flex: 1;
        background: #00e5ff;
        border: none;
        border-radius: 12px;
        color: #020617;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 14px;
        padding: 14px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .popup-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 50px -26px rgba(0, 229, 255, 0.6);
      }

      .popup-skip {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #6d6a84;
        font-family: inherit;
        font-size: 13px;
        padding: 14px 18px;
        cursor: pointer;
      }

      .popup-skip:hover {
        color: #9a96b7;
      }

      .popup-success {
        text-align: center;
        padding: 12px 0 4px;
      }

      .popup-success p {
        font-size: 14px;
        color: #86f1ff;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="logo" style="text-decoration:none; color:inherit;">Agent<span>Booking</span></a>
      <a href="/demo">← Modifier la démo</a>
    </header>

    <main class="chat" id="chat"></main>

    <div class="input-row">
      <input id="message-input" type="text" placeholder="Écrivez votre message..." autocomplete="off" />
      <button id="send-btn" type="button">Envoyer</button>
    </div>

    <!-- Popup recontact -->
    <div class="popup-overlay" id="popup-overlay">
      <div class="popup">
        <div id="popup-form">
          <div class="popup-title">Vous voulez la même chose ?</div>
          <div class="popup-sub">Laissez vos coordonnées — on vous propose une solution 100% adaptée à votre business.</div>
          <label for="popup-mail">Email</label>
          <input id="popup-mail" type="email" placeholder="vous@exemple.com" autocomplete="email" />
          <label for="popup-whatsapp">WhatsApp</label>
          <input id="popup-whatsapp" type="tel" placeholder="+33 6 00 00 00 00" autocomplete="tel" />
          <div class="popup-actions">
            <button class="popup-submit" id="popup-submit">Être recontacté →</button>
            <button class="popup-skip" id="popup-skip">Plus tard</button>
          </div>
        </div>
        <div id="popup-success" class="popup-success" style="display:none;">
          <div style="font-size:32px;">✅</div>
          <p>Parfait ! On revient vers vous très rapidement.</p>
        </div>
      </div>
    </div>

    <script>
      const WEBHOOK_URL = '/api/chat';
      const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzuB0nVcB8qN5ERBywFUR5jl82jWCHeI6A03c-1D0_UdtC0YTW_VqsdKf5eIbtzf3fU/exec';
      const BUSINESS_NAME = localStorage.getItem('agent_demo_name') || 'votre établissement';
      const BUSINESS_DOMAIN = localStorage.getItem('agent_demo_domain') || 'autre';
      const BUSINESS_PROBLEM = localStorage.getItem('agent_demo_problem') || 'autre';

      // Unique session ID per demo — prevents n8n memory from mixing users
      const SESSION_ID = crypto.randomUUID();

      const DOMAIN_LABELS = {
        boite_de_nuit: 'Boîte de nuit',
        conciergerie: 'Conciergerie',
        tourisme: 'Tourisme',
        location: 'Location',
      };

      const chat = document.getElementById('chat');
      const input = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');

      function addBubble(text, type) {
        const el = document.createElement('div');
        el.className = type === 'typing' ? 'typing' : `bubble ${type}`;
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
        return el;
      }

      function showIntro() {
        addBubble('🎯 Mode démo connecté à l\'agent Agent Booking', 'meta');
      }

      let typingBubble = null;

      function showTyping() {
        if (!typingBubble) {
          typingBubble = addBubble("L'agent rédige...", 'typing');
        }
      }

      function hideTyping() {
        if (typingBubble) {
          typingBubble.remove();
          typingBubble = null;
        }
      }

      function sendMessage() {
        const content = input.value.trim();
        if (!content) return;

        addBubble(content, 'user');
        input.value = '';
        sendBtn.disabled = true;
        showTyping();

        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            chatInput: content,
            sessionId: SESSION_ID,
            source: 'agentbooking-demo',
            clubName: BUSINESS_NAME,
            domain: BUSINESS_DOMAIN,
            problem: BUSINESS_PROBLEM,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            hideTyping();
            const answer = data.output || data.message || data.text || JSON.stringify(data);
            addBubble(answer, 'bot');
            sendBtn.disabled = false;
            input.focus();
            if (answer.startsWith('Votre réservation est maintenant confirmée')) {
              setTimeout(() => showPopup(), 3000);
            }
          })
          .catch((error) => {
            hideTyping();
            addBubble(`Erreur de connexion : ${error.message}`, 'error');
            sendBtn.disabled = false;
            input.focus();
          });
      }

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          sendMessage();
        }
      });

      // Popup recontact
      const popupOverlay = document.getElementById('popup-overlay');

      function showPopup() {
        popupOverlay.classList.add('visible');
      }

      document.getElementById('popup-skip').addEventListener('click', () => {
        popupOverlay.classList.remove('visible');
        showHomeButton();
      });

      function showHomeButton() {
        const el = document.createElement('a');
        el.href = '/';
        el.className = 'bubble meta';
        el.style.cursor = 'pointer';
        el.style.textDecoration = 'none';
        el.textContent = '← Retour à l\'accueil';
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      }

      document.getElementById('popup-submit').addEventListener('click', () => {
        const mail = document.getElementById('popup-mail').value.trim();
        const whatsapp = document.getElementById('popup-whatsapp').value.trim();
        if (!mail && !whatsapp) return;

        const params = new URLSearchParams({
          businessName: BUSINESS_NAME,
          domain: BUSINESS_DOMAIN,
          problem: BUSINESS_PROBLEM,
          whatsapp,
          mail,
        });
        new Image().src = `${SHEETS_URL}?${params}`;

        document.getElementById('popup-form').style.display = 'none';
        document.getElementById('popup-success').style.display = 'block';
        setTimeout(() => {
          popupOverlay.classList.remove('visible');
          showHomeButton();
        }, 2500);
      });

      showIntro();
      input.focus();
    </script>
  </body>
</html>
